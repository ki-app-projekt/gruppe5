<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Hasen Parkour</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #gameCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 5;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      padding: 8px 12px;
      font-size: 16px;
      display: none;
    }

    #stats {
      position: fixed;
      top: 10px;
      right: 170px;
      z-index: 5;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      padding: 8px 12px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }

    #fullscreenButton {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 40;
      padding: 10px 14px;
      font-size: 16px;
      font-weight: bold;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    /* Startbildschirm */
    #menuScreen {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #062406, #0b3b12 45%, #031203);
      overflow: hidden;
    }

    .menuTree {
      position: absolute;
      width: 80px;
      height: 160px;
      opacity: 0.65;
    }

    .treeTrunk {
      position: absolute;
      left: 32px;
      top: 75px;
      width: 18px;
      height: 80px;
      background: #5b3317;
    }

    .treeLeaves1,
    .treeLeaves2,
    .treeLeaves3 {
      position: absolute;
      background: #168223;
    }

    .treeLeaves1 {
      left: 25px;
      top: 10px;
      width: 30px;
      height: 30px;
    }

    .treeLeaves2 {
      left: 10px;
      top: 38px;
      width: 60px;
      height: 35px;
      background: #1ea333;
    }

    .treeLeaves3 {
      left: 0;
      top: 70px;
      width: 80px;
      height: 35px;
      background: #145c1c;
    }

    .treeA { left: 8%; bottom: 8%; transform: scale(1.3); }
    .treeB { left: 22%; bottom: 18%; transform: scale(0.9); }
    .treeC { left: 68%; bottom: 12%; transform: scale(1.2); }
    .treeD { left: 82%; bottom: 22%; transform: scale(0.85); }

    #menuRabbitArea {
      position: relative;
      width: 180px;
      height: 180px;
      animation: menuJump 1.1s infinite ease-in-out;
      margin-bottom: 30px;
    }

    @keyframes menuJump {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-45px);
      }
    }

    .menuRabbit {
      position: absolute;
      left: 45px;
      top: 35px;
      width: 90px;
      height: 95px;
    }

    .rabbitPart {
      position: absolute;
      background: white;
      border: 2px solid #222;
    }

    .rabbitEar1 {
      left: 12px;
      top: -35px;
      width: 18px;
      height: 45px;
    }

    .rabbitEar2 {
      left: 55px;
      top: -35px;
      width: 18px;
      height: 45px;
    }

    .rabbitInner1 {
      position: absolute;
      left: 17px;
      top: -27px;
      width: 8px;
      height: 30px;
      background: #ff9fc8;
    }

    .rabbitInner2 {
      position: absolute;
      left: 60px;
      top: -27px;
      width: 8px;
      height: 30px;
      background: #ff9fc8;
    }

    .rabbitBody {
      left: 10px;
      top: 10px;
      width: 65px;
      height: 65px;
    }

    .rabbitEye {
      position: absolute;
      left: 55px;
      top: 30px;
      width: 9px;
      height: 9px;
      background: black;
    }

    .rabbitNose {
      position: absolute;
      left: 65px;
      top: 50px;
      width: 9px;
      height: 9px;
      background: #ff9fc8;
    }

    .rabbitTail {
      left: -4px;
      top: 48px;
      width: 16px;
      height: 22px;
    }

    .menuGrassBlock {
      position: relative;
      width: 150px;
      height: 60px;
      background: #8b5a2b;
      border: 4px solid #2b1608;
      margin-bottom: 35px;
    }

    .menuGrassBlock::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 18px;
      background: #2bd63f;
    }

    .yellowButton {
      width: 95px;
      height: 95px;
      border: 4px solid white;
      border-radius: 18px;
      background: #ffd400;
      color: white;
      font-size: 56px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px black;
    }

    .yellowButton:hover {
      background: #ffea00;
      transform: scale(1.08);
    }

    /* Skin-Menüs */
    .skinPanel {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 3px solid white;
      border-radius: 18px;
      color: white;
      z-index: 30;
    }

    .skinPanel h2 {
      margin: 0 0 12px 0;
      text-align: center;
      font-size: 20px;
    }

    .skinPanelLeft {
      left: 25px;
    }

    .skinPanelRight {
      right: 25px;
    }

    .skinOption {
      width: 100%;
      height: 70px;
      margin-bottom: 12px;
      background: #ffd400;
      border: 3px solid white;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skinOption:hover {
      background: #ffea00;
      transform: scale(1.04);
    }

    .skinOption.selected {
      outline: 4px solid #00ff66;
      background: #ffe95a;
    }

    .skinPreview {
      position: relative;
      width: 70px;
      height: 50px;
    }

    .previewBlock {
      position: absolute;
      border: 1px solid #222;
    }

    .previewRabbitBody {
      left: 18px;
      top: 20px;
      width: 34px;
      height: 26px;
    }

    .previewRabbitEar1 {
      left: 20px;
      top: 0;
      width: 8px;
      height: 24px;
    }

    .previewRabbitEar2 {
      left: 42px;
      top: 0;
      width: 8px;
      height: 24px;
    }

    .previewRabbitEye {
      left: 43px;
      top: 29px;
      width: 5px;
      height: 5px;
      background: black;
    }

    .previewFoxBody {
      left: 8px;
      top: 24px;
      width: 40px;
      height: 18px;
    }

    .previewFoxHead {
      left: 44px;
      top: 13px;
      width: 22px;
      height: 22px;
    }

    .previewFoxEar1 {
      left: 46px;
      top: 2px;
      width: 8px;
      height: 13px;
    }

    .previewFoxEar2 {
      left: 58px;
      top: 2px;
      width: 8px;
      height: 13px;
    }

    .previewFoxTail {
      left: -4px;
      top: 22px;
      width: 14px;
      height: 18px;
    }

    .previewFoxEye {
      left: 55px;
      top: 21px;
      width: 5px;
      height: 5px;
    }

    /* Game Over */
    #gameOverText {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.45);
      pointer-events: auto;
    }

    .gameOverTitle {
      color: white;
      font-size: 100px;
      font-weight: bold;
      text-shadow: 0 0 15px black, 0 0 25px white;
      margin-bottom: 30px;
    }

    .gameOverButtons {
      display: flex;
      gap: 25px;
    }
  </style>
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <div id="info">
    <b>D</b> = rechts |
    <b>A</b> = links |
    <b>Leertaste</b> = Sprung |
    <b>2× Leertaste</b> = Doppelsprung |
    <b>Enter</b> = Neustart
  </div>

  <div id="stats">
    🥕 Karotten: 0 | ⭐ Punkte: 0
  </div>

  <div id="menuScreen">
    <div id="rabbitSkinMenu" class="skinPanel skinPanelLeft">
      <h2>Hasen-Skins</h2>
      <div id="rabbitSkinOptions"></div>
    </div>

    <div id="foxSkinMenu" class="skinPanel skinPanelRight">
      <h2>Fuchs-Skins</h2>
      <div id="foxSkinOptions"></div>
    </div>

    <div class="menuTree treeA">
      <div class="treeTrunk"></div>
      <div class="treeLeaves1"></div>
      <div class="treeLeaves2"></div>
      <div class="treeLeaves3"></div>
    </div>

    <div class="menuTree treeB">
      <div class="treeTrunk"></div>
      <div class="treeLeaves1"></div>
      <div class="treeLeaves2"></div>
      <div class="treeLeaves3"></div>
    </div>

    <div class="menuTree treeC">
      <div class="treeTrunk"></div>
      <div class="treeLeaves1"></div>
      <div class="treeLeaves2"></div>
      <div class="treeLeaves3"></div>
    </div>

    <div class="menuTree treeD">
      <div class="treeTrunk"></div>
      <div class="treeLeaves1"></div>
      <div class="treeLeaves2"></div>
      <div class="treeLeaves3"></div>
    </div>

    <div id="menuRabbitArea">
      <div class="menuRabbit">
        <div class="rabbitPart rabbitEar1"></div>
        <div class="rabbitPart rabbitEar2"></div>
        <div class="rabbitInner1"></div>
        <div class="rabbitInner2"></div>
        <div class="rabbitPart rabbitBody"></div>
        <div class="rabbitEye"></div>
        <div class="rabbitNose"></div>
        <div class="rabbitPart rabbitTail"></div>
      </div>
    </div>

    <div class="menuGrassBlock"></div>

    <button id="playButton" class="yellowButton">▶</button>
  </div>

  <div id="gameOverText">
    <div class="gameOverTitle">GAME OVER</div>

    <div class="gameOverButtons">
      <button id="homeButton" class="yellowButton">⌂</button>
      <button id="restartButton" class="yellowButton">↻</button>
    </div>
  </div>

  <button id="fullscreenButton">Vollbild starten</button>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const stats = document.getElementById("stats");
    const info = document.getElementById("info");
    const gameOverText = document.getElementById("gameOverText");
    const menuScreen = document.getElementById("menuScreen");

    const playButton = document.getElementById("playButton");
    const homeButton = document.getElementById("homeButton");
    const restartButton = document.getElementById("restartButton");
    const fullscreenButton = document.getElementById("fullscreenButton");

    const rabbitSkinOptions = document.getElementById("rabbitSkinOptions");
    const foxSkinOptions = document.getElementById("foxSkinOptions");

    const cols = 40;
    const rows = 18;
    const groundY = 14;

    let tileW;
    let tileH;

    let playerX;
    let playerY;
    let cameraX;

    let world;
    let hasMovedRight;

    let keys = {
      left: false,
      right: false
    };

    let isJumping;
    let jumpStartTime;
    let jumpDuration;
    let jumpHeight;
    let jumpBaseY;
    let canDoubleJump;
    let doubleJumpUsed;
    let doubleJumpWindow;

    let carrots;
    let points;
    let scoreStartTime;
    let obstacleCounter;

    let gameState = "menu";
    let lastTime = 0;
    let lastJumpPadIndex = -1;

    let foxActive;
    let foxWorldX;
    let foxY;
    let foxStartTime;
    let foxDelay;

    let selectedRabbitSkin = 0;
    let selectedFoxSkin = 0;

    const rabbitSkins = [
      {
        name: "Weiß",
        body: "white",
        ear: "#ff9fc8",
        nose: "#ff9fc8",
        eye: "black"
      },
      {
        name: "Grau",
        body: "#bfc7c9",
        ear: "#ffb6d5",
        nose: "#ff8fbc",
        eye: "black"
      },
      {
        name: "Braun",
        body: "#b8793f",
        ear: "#f0a36a",
        nose: "#ff9fc8",
        eye: "black"
      },
      {
        name: "Gold",
        body: "#ffd65a",
        ear: "#ff9fc8",
        nose: "#ff7fae",
        eye: "black"
      }
    ];

    const foxSkins = [
      {
        name: "Orange",
        body: "#e86f1c",
        leg: "#9b3e12",
        white: "white",
        eye: "black"
      },
      {
        name: "Rot",
        body: "#c9341c",
        leg: "#7a1e12",
        white: "white",
        eye: "black"
      },
      {
        name: "Schwarz",
        body: "#222222",
        leg: "#111111",
        white: "#dddddd",
        eye: "white"
      },
      {
        name: "Eisfuchs",
        body: "#d9f3ff",
        leg: "#9ccddd",
        white: "white",
        eye: "black"
      }
    ];

    function createSkinMenus() {
      rabbitSkinOptions.innerHTML = "";
      foxSkinOptions.innerHTML = "";

      rabbitSkins.forEach((skin, index) => {
        const button = document.createElement("button");
        button.className = "skinOption";
        button.title = skin.name;

        button.innerHTML = `
          <div class="skinPreview">
            <div class="previewBlock previewRabbitEar1" style="background:${skin.body}"></div>
            <div class="previewBlock previewRabbitEar2" style="background:${skin.body}"></div>
            <div class="previewBlock previewRabbitBody" style="background:${skin.body}"></div>
            <div class="previewBlock previewRabbitEye" style="background:${skin.eye}"></div>
          </div>
        `;

        button.addEventListener("click", () => {
          selectedRabbitSkin = index;
          updateSkinSelection();
          updateMenuRabbitSkin();
        });

        rabbitSkinOptions.appendChild(button);
      });

      foxSkins.forEach((skin, index) => {
        const button = document.createElement("button");
        button.className = "skinOption";
        button.title = skin.name;

        button.innerHTML = `
          <div class="skinPreview">
            <div class="previewBlock previewFoxTail" style="background:${skin.body}"></div>
            <div class="previewBlock previewFoxBody" style="background:${skin.body}"></div>
            <div class="previewBlock previewFoxHead" style="background:${skin.body}"></div>
            <div class="previewBlock previewFoxEar1" style="background:${skin.body}"></div>
            <div class="previewBlock previewFoxEar2" style="background:${skin.body}"></div>
            <div class="previewBlock previewFoxEye" style="background:${skin.eye}"></div>
          </div>
        `;

        button.addEventListener("click", () => {
          selectedFoxSkin = index;
          updateSkinSelection();
        });

        foxSkinOptions.appendChild(button);
      });

      updateSkinSelection();
      updateMenuRabbitSkin();
    }

    function updateSkinSelection() {
      const rabbitButtons = rabbitSkinOptions.querySelectorAll(".skinOption");
      const foxButtons = foxSkinOptions.querySelectorAll(".skinOption");

      rabbitButtons.forEach((button, index) => {
        button.classList.toggle("selected", index === selectedRabbitSkin);
      });

      foxButtons.forEach((button, index) => {
        button.classList.toggle("selected", index === selectedFoxSkin);
      });
    }

    function updateMenuRabbitSkin() {
      const skin = rabbitSkins[selectedRabbitSkin];

      document.querySelectorAll(".menuRabbit .rabbitPart").forEach(part => {
        part.style.background = skin.body;
      });

      document.querySelector(".rabbitInner1").style.background = skin.ear;
      document.querySelector(".rabbitInner2").style.background = skin.ear;
      document.querySelector(".rabbitNose").style.background = skin.nose;
      document.querySelector(".rabbitEye").style.background = skin.eye;
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      tileW = canvas.width / cols;
      tileH = canvas.height / rows;
    }

    window.addEventListener("resize", resizeCanvas);

    function updateStats() {
      stats.textContent = "🥕 Karotten: " + carrots + " | ⭐ Punkte: " + points;
    }

    function showMenu() {
      gameState = "menu";
      keys.left = false;
      keys.right = false;

      menuScreen.style.display = "flex";
      gameOverText.style.display = "none";
      stats.style.display = "none";
      info.style.display = "none";
    }

    function startGame() {
      restartGame();
      gameState = "playing";

      menuScreen.style.display = "none";
      gameOverText.style.display = "none";
      stats.style.display = "block";
      info.style.display = "block";
    }

    function showGameOver() {
      gameState = "gameover";
      keys.left = false;
      keys.right = false;

      gameOverText.style.display = "flex";
      stats.style.display = "block";
      info.style.display = "block";
    }

    function createStartWorld() {
      world = [];
      obstacleCounter = 0;

      for (let i = 0; i < 90; i++) {
        world.push({
          grassHeight: 0,
          jumpPad: false,
          carrot: false
        });
      }
    }

    function generateMoreWorld() {
      while (world.length < cameraX + cols + 180) {
        const distance = world.length;

        const difficulty = Math.min(0.58, 0.06 + distance / 650);
        const jumpPadChance = Math.min(0.18, 0.04 + distance / 2500);

        const last = world[world.length - 1];
        const secondLast = world[world.length - 2];

        const canPlaceGrass =
          last.grassHeight === 0 &&
          secondLast.grassHeight === 0;

        let grassHeight = 0;
        let carrot = false;

        if (Math.random() < difficulty && canPlaceGrass) {
          grassHeight = Math.random() < 0.4 ? 2 : 1;
          obstacleCounter++;

          if (obstacleCounter % 2 === 0) {
            carrot = true;
          }
        }

        let jumpPad = false;

        if (
          Math.random() < jumpPadChance &&
          !last.jumpPad &&
          !secondLast.jumpPad
        ) {
          jumpPad = true;
        }

        world.push({
          grassHeight,
          jumpPad,
          carrot
        });
      }
    }

    function getTile(worldX) {
      if (worldX < 0) {
        return {
          grassHeight: 0,
          jumpPad: false,
          carrot: false
        };
      }

      generateMoreWorld();

      const index = Math.floor(worldX);

      if (!world[index]) {
        return {
          grassHeight: 0,
          jumpPad: false,
          carrot: false
        };
      }

      return world[index];
    }

    function getStandY(worldX) {
      const tile = getTile(Math.floor(worldX));

      if (tile.grassHeight === 0) {
        return groundY;
      }

      return groundY - tile.grassHeight;
    }

    function restartGame() {
      playerX = cols / 2;
      playerY = groundY;
      cameraX = 0;

      hasMovedRight = false;

      keys.left = false;
      keys.right = false;

      isJumping = false;
      jumpStartTime = 0;
      jumpDuration = 0;
      jumpHeight = 3;
      jumpBaseY = groundY;
      canDoubleJump = false;
      doubleJumpUsed = false;

      carrots = 0;
      points = 0;
      scoreStartTime = performance.now();

      lastJumpPadIndex = -1;
      clearTimeout(doubleJumpWindow);

      createStartWorld();
      generateMoreWorld();

      foxActive = false;
      foxWorldX = -20;
      foxY = groundY;
      foxStartTime = performance.now();
      foxDelay = 10000 + Math.random() * 5000;

      gameState = "playing";
      menuScreen.style.display = "none";
      gameOverText.style.display = "none";
      stats.style.display = "block";
      info.style.display = "block";

      updateStats();
    }

    function startNormalJump() {
      isJumping = true;
      jumpStartTime = performance.now();
      jumpDuration = 620;
      jumpHeight = 3;
      jumpBaseY = playerY;

      canDoubleJump = true;
      doubleJumpUsed = false;

      clearTimeout(doubleJumpWindow);

      doubleJumpWindow = setTimeout(() => {
        canDoubleJump = false;
      }, 260);
    }

    function startDoubleJump() {
      doubleJumpUsed = true;
      canDoubleJump = false;

      jumpStartTime = performance.now();
      jumpDuration = 700;
      jumpHeight = 4;
      jumpBaseY = playerY;

      clearTimeout(doubleJumpWindow);
    }

    function startJumpPadJump() {
      isJumping = true;
      jumpStartTime = performance.now();
      jumpDuration = 850;
      jumpHeight = 6;
      jumpBaseY = playerY;

      canDoubleJump = true;
      doubleJumpUsed = false;

      clearTimeout(doubleJumpWindow);

      doubleJumpWindow = setTimeout(() => {
        canDoubleJump = false;
      }, 300);
    }

    function startJump() {
      if (gameState !== "playing") return;

      if (!isJumping) {
        startNormalJump();
        return;
      }

      if (isJumping && canDoubleJump && !doubleJumpUsed) {
        startDoubleJump();
      }
    }

    function updateJump(time) {
      const currentWorldX = cameraX + playerX;
      const standY = getStandY(currentWorldX);

      if (!isJumping) {
        playerY = standY;
        return;
      }

      const progress = (time - jumpStartTime) / jumpDuration;

      if (progress >= 1) {
        isJumping = false;
        playerY = standY;
        checkJumpPad();
        checkCarrotCollect();
        return;
      }

      const curve = Math.sin(progress * Math.PI);
      playerY = jumpBaseY - curve * jumpHeight;
    }

    function isBlockedByGrassWall(nextWorldX) {
      const tile = getTile(nextWorldX);

      if (tile.grassHeight === 0) {
        return false;
      }

      const wallTopY = groundY - tile.grassHeight;

      return playerY > wallTopY + 0.05;
    }

    function updateMovement(deltaTime) {
      if (gameState !== "playing") return;

      const speed = 8;
      const move = speed * deltaTime;

      if (keys.right) {
        hasMovedRight = true;

        const nextWorldX = cameraX + playerX + move;

        if (!isBlockedByGrassWall(nextWorldX)) {
          cameraX += move;
        }
      }

      if (keys.left && hasMovedRight) {
        const nextWorldX = cameraX + playerX - move;

        if (!isBlockedByGrassWall(nextWorldX)) {
          cameraX -= move;

          if (cameraX < 0) {
            cameraX = 0;
          }
        }
      }

      checkJumpPad();
      checkCarrotCollect();
    }

    function checkJumpPad() {
      if (gameState !== "playing") return;

      const worldX = cameraX + playerX;
      const index = Math.floor(worldX);
      const tile = getTile(worldX);
      const standY = getStandY(worldX);

      if (
        tile.jumpPad &&
        !isJumping &&
        Math.abs(playerY - standY) < 0.1 &&
        lastJumpPadIndex !== index
      ) {
        lastJumpPadIndex = index;
        startJumpPadJump();
      }

      if (!tile.jumpPad) {
        lastJumpPadIndex = -1;
      }
    }

    function checkCarrotCollect() {
      if (gameState !== "playing") return;

      const worldX = cameraX + playerX;
      const index = Math.floor(worldX);
      const tile = getTile(index);

      if (!tile.carrot) return;

      const carrotY = getStandY(index) - 1;

      const closeX = Math.abs(worldX - (index + 0.5)) < 0.8;
      const closeY = Math.abs(playerY - carrotY) < 1.6;

      if (closeX && closeY) {
        tile.carrot = false;
        carrots++;
        updateStats();
      }
    }

    function updateScore(time) {
      if (gameState !== "playing") return;

      points = Math.floor((time - scoreStartTime) / 1000);
      updateStats();
    }

    function updateFox(time, deltaTime) {
      if (gameState !== "playing") return;

      const rabbitWorldX = cameraX + playerX;

      if (!foxActive && time - foxStartTime >= foxDelay) {
        foxActive = true;
        foxWorldX = rabbitWorldX - 14;
      }

      if (!foxActive) return;

      if (foxWorldX > rabbitWorldX + 2) {
        foxWorldX = rabbitWorldX - 14;
      }

      const foxSpeed = Math.min(8.4, 4.8 + rabbitWorldX / 250);
      foxWorldX += foxSpeed * deltaTime;
      foxY = getStandY(foxWorldX);

      checkFoxCollision();
    }

    function checkFoxCollision() {
      if (!foxActive || gameState !== "playing") return;

      const rabbitWorldX = cameraX + playerX;

      const dx = Math.abs(foxWorldX - rabbitWorldX);
      const dy = Math.abs(foxY - playerY);

      if (dx < 1.25 && dy < 2.3) {
        showGameOver();
      }
    }

    function drawBlock(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawBlockBackground() {
      ctx.fillStyle = "#071807";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = -5; i < cols + 10; i++) {
        const screenX =
          (i * tileW * 2) -
          ((cameraX * tileW * 0.25) % (tileW * 2));

        drawBlockTree(
          screenX,
          groundY * tileH - tileH * 5,
          tileW * 0.9,
          0.45
        );
      }

      for (let i = -5; i < cols + 10; i++) {
        const screenX =
          (i * tileW * 2.5) -
          ((cameraX * tileW * 0.45) % (tileW * 2.5));

        drawBlockTree(
          screenX,
          groundY * tileH - tileH * 4,
          tileW * 1.1,
          0.7
        );
      }
    }

    function drawBlockTree(x, y, size, opacity) {
      ctx.globalAlpha = opacity;

      const b = size / 4;

      drawBlock(x + b * 1.5, y + b * 4, b, b * 3, "#5b3317");

      drawBlock(x + b, y + b, b * 2, b, "#145c1c");
      drawBlock(x + b * 0.5, y + b * 2, b * 3, b, "#1d7a28");
      drawBlock(x, y + b * 3, b * 4, b, "#249431");
      drawBlock(x + b * 0.5, y + b * 4, b * 3, b, "#1d7a28");

      ctx.globalAlpha = 1;
    }

    function drawGrassBlock(screenX, heightBlocks) {
      for (let h = 0; h < heightBlocks; h++) {
        const x = screenX * tileW;
        const y = (groundY - h) * tileH;

        drawBlock(x, y, tileW, tileH, "#8b5a2b");
        drawBlock(x, y, tileW, tileH * 0.28, "#2bd63f");

        drawBlock(x + tileW * 0.15, y + tileH * 0.5, tileW * 0.18, tileH * 0.18, "#5c3518");
        drawBlock(x + tileW * 0.6, y + tileH * 0.65, tileW * 0.18, tileH * 0.18, "#5c3518");

        ctx.strokeStyle = "#2b1608";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, tileW, tileH);
      }
    }

    function drawFlower(screenX, standY) {
      const x = screenX * tileW;
      const y = standY * tileH;
      const b = Math.min(tileW, tileH) / 8;
      const centerX = x + tileW * 0.5;
      const baseY = y + tileH * 0.75;

      drawBlock(centerX - b * 0.5, baseY - b * 3, b, b * 3, "#21b336");

      drawBlock(centerX - b * 2, baseY - b * 2, b * 1.5, b, "#1f8f2e");
      drawBlock(centerX + b * 0.5, baseY - b * 2, b * 1.5, b, "#1f8f2e");

      drawBlock(centerX - b * 1.5, baseY - b * 5, b, b, "#ff4fd8");
      drawBlock(centerX + b * 0.5, baseY - b * 5, b, b, "#ff4fd8");
      drawBlock(centerX - b * 0.5, baseY - b * 6, b, b, "#ff4fd8");
      drawBlock(centerX - b * 0.5, baseY - b * 4, b, b, "#ff4fd8");
      drawBlock(centerX - b * 0.5, baseY - b * 5, b, b, "#ffe600");
    }

    function drawCarrot(screenX, carrotY) {
      const x = screenX * tileW;
      const y = carrotY * tileH;
      const b = Math.min(tileW, tileH) / 8;
      const centerX = x + tileW * 0.5;
      const baseY = y + tileH * 0.9;

      drawBlock(centerX - b * 1.5, baseY - b * 6, b, b * 2, "#25c13b");
      drawBlock(centerX - b * 0.2, baseY - b * 6.5, b, b * 2, "#25c13b");
      drawBlock(centerX + b, baseY - b * 6, b, b * 2, "#25c13b");

      drawBlock(centerX - b * 1.5, baseY - b * 4, b * 3, b, "#ff8c1a");
      drawBlock(centerX - b, baseY - b * 3, b * 2, b, "#ff8c1a");
      drawBlock(centerX - b * 0.5, baseY - b * 2, b, b, "#ff8c1a");

      drawBlock(centerX + b * 0.7, baseY - b * 3, b * 0.6, b * 0.6, "#d96b00");
    }

    function drawRabbit() {
      const skin = rabbitSkins[selectedRabbitSkin];

      const x = playerX * tileW;
      const y = playerY * tileH;
      const b = Math.min(tileW, tileH) / 8;
      const startX = x + tileW * 0.15;
      const startY = y + tileH * 0.1;

      drawBlock(startX + b, startY - b * 4, b * 2, b * 5, skin.body);
      drawBlock(startX + b * 5, startY - b * 4, b * 2, b * 5, skin.body);

      drawBlock(startX + b * 1.5, startY - b * 3, b, b * 3, skin.ear);
      drawBlock(startX + b * 5.5, startY - b * 3, b, b * 3, skin.ear);

      drawBlock(startX + b, startY + b, b * 6, b * 6, skin.body);

      drawBlock(startX + b * 5, startY + b * 3, b, b, skin.eye);
      drawBlock(startX + b * 6, startY + b * 5, b, b, skin.nose);

      drawBlock(startX + b, startY + b * 7, b * 2, b, skin.body);
      drawBlock(startX + b * 5, startY + b * 7, b * 2, b, skin.body);

      drawBlock(startX, startY + b * 5, b, b * 2, skin.body);

      ctx.strokeStyle = "#222";
      ctx.lineWidth = 2;
      ctx.strokeRect(startX + b, startY + b, b * 6, b * 6);
    }

    function drawFox() {
      if (!foxActive) return;

      const skin = foxSkins[selectedFoxSkin];

      const screenX = foxWorldX - cameraX;

      if (screenX < -6 || screenX > cols + 6) return;

      const x = screenX * tileW;
      const y = foxY * tileH;
      const b = Math.min(tileW, tileH) / 6;
      const startX = x - tileW * 0.45;
      const startY = y - tileH * 0.75;

      drawBlock(startX + b, startY + b * 4, b * 9, b * 6, skin.body);
      drawBlock(startX + b * 8, startY + b * 1.5, b * 4.5, b * 4.5, skin.body);

      drawBlock(startX + b * 8.2, startY, b * 1.6, b * 2.2, skin.body);
      drawBlock(startX + b * 11, startY, b * 1.6, b * 2.2, skin.body);

      drawBlock(startX + b * 10, startY + b * 4, b * 2.5, b * 1.5, skin.white);

      drawBlock(startX + b * 10, startY + b * 2.8, b, b, skin.eye);
      drawBlock(startX + b * 12.2, startY + b * 4.4, b, b, "black");

      drawBlock(startX + b * 2, startY + b * 10, b * 1.7, b * 2.5, skin.leg);
      drawBlock(startX + b * 7, startY + b * 10, b * 1.7, b * 2.5, skin.leg);

      drawBlock(startX - b * 2.5, startY + b * 4.2, b * 3.5, b * 3.5, skin.body);
      drawBlock(startX - b * 3.5, startY + b * 4.2, b, b * 3.5, skin.white);

      ctx.strokeStyle = "#4a1b05";
      ctx.lineWidth = 2;
      ctx.strokeRect(startX + b, startY + b * 4, b * 9, b * 6);
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawBlockBackground();

      if (!world) return;

      generateMoreWorld();

      for (let x = -1; x < cols + 2; x++) {
        const worldX = Math.floor(cameraX + x);
        const tile = getTile(worldX);
        const screenX = worldX - cameraX;

        if (tile.grassHeight > 0) {
          drawGrassBlock(screenX, tile.grassHeight);
        }

        if (tile.jumpPad) {
          const standY = getStandY(worldX);
          drawFlower(screenX, standY);
        }

        if (tile.carrot) {
          const carrotY = getStandY(worldX) - 1;
          drawCarrot(screenX, carrotY);
        }
      }

      if (gameState !== "menu") {
        drawFox();
        drawRabbit();
      }
    }

    function gameLoop(time) {
      const deltaTime = Math.min((time - lastTime) / 1000, 0.05);
      lastTime = time;

      if (gameState === "playing") {
        updateJump(time);
        updateMovement(deltaTime);
        updateFox(time, deltaTime);
        updateScore(time);
        checkCarrotCollect();
      }

      drawGame();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        if (gameState === "gameover") {
          restartGame();
        }
        return;
      }

      if (gameState !== "playing") return;

      if (event.key.toLowerCase() === "d") {
        keys.right = true;
      }

      if (event.key.toLowerCase() === "a") {
        keys.left = true;
      }

      if (event.code === "Space") {
        event.preventDefault();

        if (!event.repeat) {
          startJump();
        }
      }
    });

    document.addEventListener("keyup", function(event) {
      if (event.key.toLowerCase() === "d") {
        keys.right = false;
      }

      if (event.key.toLowerCase() === "a") {
        keys.left = false;
      }
    });

    playButton.addEventListener("click", function() {
      startGame();
    });

    restartButton.addEventListener("click", function() {
      restartGame();
    });

    homeButton.addEventListener("click", function() {
      showMenu();
    });

    fullscreenButton.addEventListener("click", function() {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      }

      fullscreenButton.style.display = "none";
    });

    resizeCanvas();
    createStartWorld();
    generateMoreWorld();
    createSkinMenus();
    showMenu();
    requestAnimationFrame(gameLoop);
  </script>

</body>
