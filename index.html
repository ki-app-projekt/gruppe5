<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Hasen Parkour mit Gras-Hitboxen</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #gameCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: black;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      padding: 8px 12px;
      font-size: 16px;
      display: none;
    }

    #stats {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      padding: 8px 12px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }

    #menuScreen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #062406, #0b3b12 45%, #031203);
      color: white;
      text-align: center;
    }

    #menuScreen h1 {
      font-size: 56px;
      margin: 0 0 20px 0;
      text-shadow: 0 0 12px black;
    }

    #menuScreen p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    #gameOverText {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
      color: white;
    }

    .gameOverTitle {
      font-size: 88px;
      font-weight: bold;
      text-shadow: 0 0 15px black, 0 0 25px white;
      margin-bottom: 30px;
    }

    .yellowButton {
      width: 92px;
      height: 92px;
      border: 4px solid white;
      border-radius: 18px;
      background: #ffd400;
      color: #222;
      font-size: 52px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px black;
      margin: 8px;
    }

    .yellowButton:hover {
      background: #ffea00;
      transform: scale(1.06);
    }

    /* ---- Startbildschirm (Deko + Skins) ---- */
    #menuScreen {
      overflow: hidden;
    }

    .menuTree {
      position: absolute;
      width: 80px;
      height: 160px;
      opacity: 0.65;
    }

    .treeTrunk {
      position: absolute;
      left: 32px;
      top: 75px;
      width: 18px;
      height: 80px;
      background: #5b3317;
    }

    .treeLeaves1,
    .treeLeaves2,
    .treeLeaves3 {
      position: absolute;
      background: #168223;
    }

    .treeLeaves1 { left: 25px; top: 10px; width: 30px; height: 30px; }
    .treeLeaves2 { left: 10px; top: 38px; width: 60px; height: 35px; background: #1ea333; }
    .treeLeaves3 { left: 0; top: 70px; width: 80px; height: 35px; background: #145c1c; }

    .treeA { left: 8%; bottom: 8%; transform: scale(1.3); }
    .treeB { left: 22%; bottom: 18%; transform: scale(0.9); }
    .treeC { left: 68%; bottom: 12%; transform: scale(1.2); }
    .treeD { left: 82%; bottom: 22%; transform: scale(0.85); }

    #menuRabbitArea {
      position: relative;
      width: 180px;
      height: 180px;
      animation: menuJump 1.1s infinite ease-in-out;
      margin-bottom: 26px;
    }

    @keyframes menuJump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-45px); }
    }

    .menuRabbit { position: absolute; left: 45px; top: 35px; width: 90px; height: 95px; }
    .rabbitPart { position: absolute; background: white; border: 2px solid #222; }
    .rabbitEar1 { left: 12px; top: -35px; width: 18px; height: 45px; }
    .rabbitEar2 { left: 55px; top: -35px; width: 18px; height: 45px; }
    .rabbitInner1 { position: absolute; left: 17px; top: -27px; width: 8px; height: 30px; background: #ff9fc8; }
    .rabbitInner2 { position: absolute; left: 60px; top: -27px; width: 8px; height: 30px; background: #ff9fc8; }
    .rabbitBody { left: 10px; top: 10px; width: 65px; height: 65px; }
    .rabbitEye { position: absolute; left: 55px; top: 30px; width: 9px; height: 9px; background: black; }
    .rabbitNose { position: absolute; left: 65px; top: 50px; width: 9px; height: 9px; background: #ff9fc8; }
    .rabbitTail { left: -4px; top: 48px; width: 16px; height: 22px; }

    .menuGrassBlock {
      position: relative;
      width: 150px;
      height: 56px;
      background: #8b5a2b;
      border: 4px solid #2b1608;
      margin-bottom: 28px;
    }

    .menuGrassBlock::before {
      content: "";
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      height: 18px;
      background: #2bd63f;
    }

    .skinPanel {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.65);
      border: 3px solid white;
      border-radius: 18px;
      color: white;
      z-index: 30;
    }

    .skinPanel h2 { margin: 0 0 12px 0; text-align: center; font-size: 20px; }
    .skinPanelLeft { left: 25px; }
    .skinPanelRight { right: 25px; }

    .skinOption {
      width: 100%;
      height: 64px;
      margin-bottom: 12px;
      background: #ffd400;
      border: 3px solid white;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skinOption:hover { background: #ffea00; transform: scale(1.04); }
    .skinOption.selected { outline: 4px solid #00ff66; background: #ffe95a; }

    .skinPreview { position: relative; width: 70px; height: 50px; }
    .previewBlock { position: absolute; border: 1px solid #222; }
    .previewRabbitBody { left: 18px; top: 20px; width: 34px; height: 26px; }
    .previewRabbitEar1 { left: 20px; top: 0; width: 8px; height: 24px; }
    .previewRabbitEar2 { left: 42px; top: 0; width: 8px; height: 24px; }
    .previewRabbitEye { left: 43px; top: 29px; width: 5px; height: 5px; background: black; }
    .previewFoxBody { left: 8px; top: 24px; width: 40px; height: 18px; }
    .previewFoxHead { left: 44px; top: 13px; width: 22px; height: 22px; }
    .previewFoxEar1 { left: 46px; top: 2px; width: 8px; height: 13px; }
    .previewFoxEar2 { left: 58px; top: 2px; width: 8px; height: 13px; }
    .previewFoxTail { left: -4px; top: 22px; width: 14px; height: 18px; }
    .previewFoxEye { left: 55px; top: 21px; width: 5px; height: 5px; }

    /* Mobil: Skin-Panels in den Fluss, kompakter */
    @media (max-width: 820px) {
      .menuTree { display: none; }
      .menuGrassBlock { display: none; }
      #menuRabbitArea { transform: scale(0.62); margin: 0 0 -10px; }
      #menuScreen { justify-content: flex-start; padding: 10px 0; overflow-y: auto; }
      .skinPanel {
        position: static;
        transform: none;
        width: 92vw;
        max-width: 380px;
        margin: 4px auto;
        padding: 8px 10px;
      }
      .skinPanel h2 { font-size: 15px; margin-bottom: 6px; }
      #rabbitSkinOptions, #foxSkinOptions { display: flex; gap: 8px; }
      .skinOption { flex: 1; width: auto; height: 46px; margin-bottom: 0; }
      .yellowButton { width: 76px; height: 76px; font-size: 40px; }
    }

    #touchControls {
      display: none;
    }

    .touchCluster {
      position: fixed;
      bottom: 14px;
      z-index: 15;
      display: flex;
      gap: 12px;
    }

    #ctrlMove { left: 16px; }
    #ctrlJump { right: 16px; }

    .touchCluster button {
      min-width: 78px;
      min-height: 62px;
      border: 3px solid white;
      border-radius: 16px;
      background: rgba(255, 212, 0, 0.92);
      color: black;
      font-size: 30px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #jumpBtn {
      background: rgba(43, 214, 63, 0.92);
    }

    #boardList {
      white-space: pre-line;
      text-align: left;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 16px;
      margin-bottom: 14px;
      min-width: 220px;
    }

    #nameButton {
      width: auto !important;
      height: auto !important;
      min-width: 150px;
      min-height: 52px;
      font-size: 20px !important;
      padding: 8px 16px;
    }

    #rotateNotice {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #062406;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      font-size: 20px;
      font-weight: bold;
      line-height: 1.6;
    }

    /* Per Media-Query (Standard) ... */
    @media (max-width: 950px) and (orientation: portrait) {
      #rotateNotice { display: flex; }
    }

    /* ... und per JS erzwungen (falls der In-App-Browser orientation ignoriert) */
    #rotateNotice.show { display: flex; }
  </style>
</head>

<body>
  <div id="rotateNotice">
    <div style="font-size:46px;">📱↻</div>
    Bitte drehe dein Gerät in den Quermodus,<br />um zu spielen.
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="info">
    <b>D</b> = rechts |
    <b>A</b> = links |
    <b>Leertaste</b> = Sprung |
    <b>2× Leertaste</b> = Doppelsprung |
    <b>H</b> = Hitboxen |
    Lauf vor dem Fuchs weg, spring über Löcher und den Bauern!
  </div>

  <div id="stats">
    🥕 Karotten: 0 | ⭐ Punkte: 0
  </div>

  <div id="menuScreen">
    <div id="rabbitSkinMenu" class="skinPanel skinPanelLeft">
      <h2>Hasen-Skins</h2>
      <div id="rabbitSkinOptions"></div>
    </div>

    <div id="foxSkinMenu" class="skinPanel skinPanelRight">
      <h2>Fuchs-Skins</h2>
      <div id="foxSkinOptions"></div>
    </div>

    <div class="menuTree treeA"><div class="treeTrunk"></div><div class="treeLeaves1"></div><div class="treeLeaves2"></div><div class="treeLeaves3"></div></div>
    <div class="menuTree treeB"><div class="treeTrunk"></div><div class="treeLeaves1"></div><div class="treeLeaves2"></div><div class="treeLeaves3"></div></div>
    <div class="menuTree treeC"><div class="treeTrunk"></div><div class="treeLeaves1"></div><div class="treeLeaves2"></div><div class="treeLeaves3"></div></div>
    <div class="menuTree treeD"><div class="treeTrunk"></div><div class="treeLeaves1"></div><div class="treeLeaves2"></div><div class="treeLeaves3"></div></div>

    <div id="menuRabbitArea">
      <div class="menuRabbit">
        <div class="rabbitPart rabbitEar1"></div>
        <div class="rabbitPart rabbitEar2"></div>
        <div class="rabbitInner1"></div>
        <div class="rabbitInner2"></div>
        <div class="rabbitPart rabbitBody"></div>
        <div class="rabbitEye"></div>
        <div class="rabbitNose"></div>
        <div class="rabbitPart rabbitTail"></div>
      </div>
    </div>

    <div class="menuGrassBlock"></div>

    <button id="playButton" class="yellowButton">▶</button>
    <button id="nameButton" class="yellowButton">Name: Hase</button>

    <div style="position:absolute;bottom:6px;right:10px;color:rgba(255,255,255,0.55);font-size:12px;z-index:31;">Build 2 · Quermodus aktiv</div>
  </div>

  <div id="touchControls">
    <div id="ctrlMove" class="touchCluster">
      <button id="leftBtn" aria-label="links">◀</button>
      <button id="rightBtn" aria-label="rechts">▶</button>
    </div>
    <div id="ctrlJump" class="touchCluster">
      <button id="jumpBtn" aria-label="springen">⤒</button>
    </div>
  </div>

  <div id="gameOverText">
    <div class="gameOverTitle">GAME OVER</div>
    <div id="finalScoreLine" style="font-size:22px;margin-bottom:6px;"></div>
    <div id="rankLine" style="font-size:20px;color:#ffd400;margin-bottom:8px;"></div>
    <div id="boardList"></div>
    <div>
      <button id="homeButton" class="yellowButton">⌂</button>
      <button id="restartButton" class="yellowButton">↻</button>
    </div>
  </div>

  <script>
    /* ============================================================
       1) Canvas und HTML-Elemente
       ============================================================ */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const info = document.getElementById("info");
    const stats = document.getElementById("stats");
    const menuScreen = document.getElementById("menuScreen");
    const gameOverText = document.getElementById("gameOverText");

    const playButton = document.getElementById("playButton");
    const homeButton = document.getElementById("homeButton");
    const restartButton = document.getElementById("restartButton");
    const nameButton = document.getElementById("nameButton");
    const touchControls = document.getElementById("touchControls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const jumpBtn = document.getElementById("jumpBtn");
    const rabbitSkinOptions = document.getElementById("rabbitSkinOptions");
    const foxSkinOptions = document.getElementById("foxSkinOptions");

    /* ============================================================
       2) Grundwerte des Spiels
       ============================================================ */

    const cols = 40;
    const rows = 18;
    const groundY = 14;

    let tileW = 0;
    let tileH = 0;

    let world = [];
    let cameraX = 0;
    let obstacleCounter = 0;
    let forceGapTiles = 0;

    let gameState = "menu";
    let lastTime = 0;

    let carrots = 0;
    let points = 0;
    let scoreStartTime = 0;

    let showHitboxes = false;

    const keys = {
      left: false,
      right: false
    };

    // Verfolgender Fuchs und gelegentlicher Bauer
    const fox = { x: 0, w: 1.5, h: 1.1 };
    const farmer = { active: false, x: 0, w: 1.3, h: 2.2, timer: 0, nextIn: 9 };

    // Auswählbare Skins
    const rabbitSkins = [
      { name: "Weiß", body: "white", ear: "#ff9fc8", nose: "#ff9fc8", eye: "black" },
      { name: "Grau", body: "#bfc7c9", ear: "#ffb6d5", nose: "#ff8fbc", eye: "black" },
      { name: "Braun", body: "#b8793f", ear: "#f0a36a", nose: "#ff9fc8", eye: "black" },
      { name: "Gold", body: "#ffd65a", ear: "#ff9fc8", nose: "#ff7fae", eye: "black" }
    ];
    const foxSkins = [
      { name: "Orange", body: "#e86f1c", leg: "#9b3e12", white: "white", eye: "black" },
      { name: "Rot", body: "#c9341c", leg: "#7a1e12", white: "white", eye: "black" },
      { name: "Schwarz", body: "#222222", leg: "#111111", white: "#dddddd", eye: "white" },
      { name: "Eisfuchs", body: "#d9f3ff", leg: "#9ccddd", white: "white", eye: "black" }
    ];
    let selectedRabbitSkin = Number(localStorage.getItem("hasenRabbitSkin") || 0);
    let selectedFoxSkin = Number(localStorage.getItem("hasenFoxSkin") || 0);

    // ---- Online-Rangliste (jsonbin.io) ----
    const BIN_ID = "6a332b5cf5f4af5e2905324b";
    const ACCESS_KEY = "$2a$10$6p/Jg.50A26s6qA4bM8Ia.ypxQ9I64QlrlzbnSCgOvzPd51.eDWd.";
    const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
    let leaderboardData = [];
    let playerName = localStorage.getItem("hasenName") || "Hase";

    /* ============================================================
       3) Spieler mit echter Rechteck-Hitbox
       ============================================================ */

    const player = {
      x: 8,
      y: groundY,
      w: 0.75,
      h: 1.35,
      vx: 0,
      vy: 0,
      speed: 9,
      jumpPower: 16,
      gravity: 42,
      onGround: false,
      canDoubleJump: false,
      doubleJumpUsed: false
    };

    /* ============================================================
       4) Canvas-Größe anpassen
       ============================================================ */

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      tileW = canvas.width / cols;
      tileH = canvas.height / rows;
    }

    window.addEventListener("resize", resizeCanvas);

    /* ============================================================
       5) Welt erzeugen
       ============================================================ */

    function createStartWorld() {
      world = [];
      obstacleCounter = 0;
      forceGapTiles = 0;

      for (let i = 0; i < 40; i++) {
        world.push({
          grassHeight: 0,
          carrot: false,
          jumpPad: false,
          gap: false
        });
      }
    }

    function generateMoreWorld() {
      while (world.length < cameraX + cols + 120) {
        const distance = world.length;

        const difficulty = Math.min(0.55, 0.08 + distance / 600);
        const jumpPadChance = Math.min(0.16, 0.04 + distance / 2200);

        const last = world[world.length - 1];
        const secondLast = world[world.length - 2];

        let grassHeight = 0;
        let carrot = false;
        let jumpPad = false;
        let gap = false;

        // Laufendes Loch (mehrere Felder breit) fortsetzen.
        if (forceGapTiles > 0) {
          gap = true;
          forceGapTiles--;
        } else {
          const canPlaceGrass =
            last.grassHeight === 0 &&
            secondLast.grassHeight === 0 &&
            !last.gap;

          if (Math.random() < difficulty && canPlaceGrass) {
            grassHeight = Math.random() < 0.4 ? 2 : 1;
            obstacleCounter++;
            if (obstacleCounter % 2 === 0) {
              carrot = true;
            }
          }

          if (
            grassHeight === 0 &&
            Math.random() < jumpPadChance &&
            !last.jumpPad &&
            !secondLast.jumpPad &&
            !last.gap
          ) {
            jumpPad = true;
          }

          // Neues Loch starten – immer 2 bis 3 Felder breit, damit man
          // wirklich reinfällt und sich nicht am Rand retten kann.
          if (
            grassHeight === 0 &&
            !jumpPad &&
            distance > 28 &&
            !last.gap &&
            !secondLast.gap
          ) {
            const gapChance = Math.min(0.10, 0.025 + distance / 4500);
            if (Math.random() < gapChance) {
              gap = true;
              forceGapTiles = 1 + (Math.random() < 0.5 ? 1 : 0); // gesamt 2–3 breit
            }
          }
        }

        world.push({
          grassHeight,
          carrot,
          jumpPad,
          gap
        });
      }
    }

    function getTile(index) {
      if (index < 0) {
        return {
          grassHeight: 0,
          carrot: false,
          jumpPad: false,
          gap: false
        };
      }

      generateMoreWorld();

      if (!world[index]) {
        return {
          grassHeight: 0,
          carrot: false,
          jumpPad: false,
          gap: false
        };
      }

      return world[index];
    }

    /* ============================================================
       6) Hitbox-Helfer
       ============================================================ */

    function getPlayerRect(x = player.x, y = player.y) {
      return {
        left: x - player.w / 2,
        right: x + player.w / 2,
        top: y - player.h,
        bottom: y
      };
    }

    function getGrassRect(tileIndex) {
      const tile = getTile(tileIndex);

      if (tile.grassHeight <= 0) {
        return null;
      }

      return {
        left: tileIndex,
        right: tileIndex + 1,
        top: groundY - tile.grassHeight,
        bottom: groundY
      };
    }

    function rectsOverlap(a, b) {
      return (
        a.left < b.right &&
        a.right > b.left &&
        a.top < b.bottom &&
        a.bottom > b.top
      );
    }

    function getNearbyGrassRects(rect) {
      const rects = [];

      const start = Math.floor(rect.left) - 1;
      const end = Math.floor(rect.right) + 1;

      for (let i = start; i <= end; i++) {
        const grassRect = getGrassRect(i);

        if (grassRect) {
          rects.push({
            index: i,
            rect: grassRect
          });
        }
      }

      return rects;
    }

    /* ============================================================
       7) Bewegung mit Gras-Hitbox-Kollision
       ============================================================ */

    function moveHorizontal(dx) {
      if (dx === 0) return;

      let nextX = player.x + dx;
      let nextRect = getPlayerRect(nextX, player.y);

      const nearbyGrass = getNearbyGrassRects(nextRect);

      for (const grass of nearbyGrass) {
        if (rectsOverlap(nextRect, grass.rect)) {
          if (dx > 0) {
            nextX = grass.rect.left - player.w / 2 - 0.001;
          } else {
            nextX = grass.rect.right + player.w / 2 + 0.001;
          }

          player.vx = 0;
          break;
        }
      }

      player.x = nextX;
    }

    function moveVertical(dy) {
      if (dy === 0) return;

      let nextY = player.y + dy;
      let nextRect = getPlayerRect(player.x, nextY);

      player.onGround = false;

      const nearbyGrass = getNearbyGrassRects(nextRect);

      for (const grass of nearbyGrass) {
        if (rectsOverlap(nextRect, grass.rect)) {
          if (dy > 0) {
            nextY = grass.rect.top;
            player.vy = 0;
            player.onGround = true;
            player.canDoubleJump = true;
            player.doubleJumpUsed = false;
          } else {
            nextY = grass.rect.bottom + player.h;
            player.vy = 0;
          }

          break;
        }
      }

      if (nextY >= groundY) {
        // Steht der Hase über festem Boden – oder über einem Loch?
        const footLeft = Math.floor(player.x - player.w / 2 + 0.05);
        const footRight = Math.floor(player.x + player.w / 2 - 0.05);
        const solidGround = !getTile(footLeft).gap || !getTile(footRight).gap;

        if (solidGround) {
          nextY = groundY;
          player.vy = 0;
          player.onGround = true;
          player.canDoubleJump = true;
          player.doubleJumpUsed = false;
        }
      }

      player.y = nextY;

      // In ein Loch gefallen?
      if (player.y > groundY + 4) {
        showGameOver();
      }
    }

    /* ============================================================
       8) Sprunglogik
       ============================================================ */

    function startJump() {
      if (gameState !== "playing") return;

      if (player.onGround) {
        player.vy = -player.jumpPower;
        player.onGround = false;
        player.canDoubleJump = true;
        player.doubleJumpUsed = false;
        return;
      }

      if (player.canDoubleJump && !player.doubleJumpUsed) {
        player.vy = -player.jumpPower * 0.9;
        player.doubleJumpUsed = true;
        player.canDoubleJump = false;
      }
    }

    function checkJumpPad() {
      const tileIndex = Math.floor(player.x);
      const tile = getTile(tileIndex);

      if (tile.jumpPad && player.onGround) {
        player.vy = -player.jumpPower * 1.35;
        player.onGround = false;
      }
    }

    /* ============================================================
       9) Karotten sammeln
       ============================================================ */

    function checkCarrotCollect() {
      const playerRect = getPlayerRect();

      const start = Math.floor(playerRect.left) - 1;
      const end = Math.floor(playerRect.right) + 1;

      for (let i = start; i <= end; i++) {
        const tile = getTile(i);

        if (!tile.carrot) continue;

        const carrotY =
          tile.grassHeight > 0
            ? groundY - tile.grassHeight - 0.65
            : groundY - 0.65;

        const carrotRect = {
          left: i + 0.3,
          right: i + 0.7,
          top: carrotY,
          bottom: carrotY + 0.45
        };

        if (rectsOverlap(playerRect, carrotRect)) {
          tile.carrot = false;
          carrots++;
          updateStats();
        }
      }
    }

    /* ============================================================
       10) Update-Logik
       ============================================================ */

    function updateGame(deltaTime) {
      if (gameState !== "playing") return;

      const dt = deltaTime / 1000;

      let moveX = 0;

      if (keys.right) {
        moveX += player.speed * dt;
      }

      if (keys.left) {
        moveX -= player.speed * dt;
      }

      moveHorizontal(moveX);

      player.vy += player.gravity * dt;
      moveVertical(player.vy * dt);

      checkJumpPad();
      checkCarrotCollect();

      const elapsed = (performance.now() - scoreStartTime) / 1000;

      // Fuchs verfolgt von hinten (etwas langsamer als der Hase,
      // wird mit der Zeit schneller – stehen bleiben = gefangen).
      const foxSpeed = 6.0 + Math.min(2.4, elapsed * 0.05);
      if (fox.x < player.x) {
        fox.x += foxSpeed * dt;
      }
      if (fox.x + fox.w >= player.x - player.w / 2) {
        showGameOver();
        return;
      }

      // Bauer taucht ab und zu vor dem Hasen auf und läuft ihm entgegen.
      farmer.timer += dt;
      if (!farmer.active && farmer.timer > farmer.nextIn) {
        farmer.active = true;
        farmer.x = player.x + cols * 0.9;
      }
      if (farmer.active) {
        farmer.x -= 1.6 * dt;

        const pr = getPlayerRect();
        const fr = {
          left: farmer.x + 0.25,
          right: farmer.x + farmer.w - 0.25,
          top: groundY - farmer.h,
          bottom: groundY
        };
        if (rectsOverlap(pr, fr)) {
          showGameOver();
          return;
        }

        if (farmer.x < cameraX - 4) {
          farmer.active = false;
          farmer.timer = 0;
          farmer.nextIn = 9 + Math.random() * 9;
        }
      }

      cameraX = player.x - cols * 0.35;

      if (cameraX < 0) {
        cameraX = 0;
      }

      points = Math.floor((performance.now() - scoreStartTime) / 100);
      updateStats();
    }

    /* ============================================================
       11) Zeichnen: Grundfunktionen
       ============================================================ */

    function drawBlock(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function worldToScreenX(worldX) {
      return (worldX - cameraX) * tileW;
    }

    function worldToScreenY(worldY) {
      return worldY * tileH;
    }

    /* ============================================================
       12) Hintergrund zeichnen
       ============================================================ */

    function drawBackground() {
      ctx.fillStyle = "#071807";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = -5; i < cols + 10; i++) {
        const x =
          i * tileW * 2 -
          ((cameraX * tileW * 0.25) % (tileW * 2));

        drawTree(x, groundY * tileH - tileH * 5, tileW * 0.9, 0.45);
      }

      for (let i = -5; i < cols + 10; i++) {
        const x =
          i * tileW * 2.5 -
          ((cameraX * tileW * 0.45) % (tileW * 2.5));

        drawTree(x, groundY * tileH - tileH * 4, tileW * 1.1, 0.7);
      }
    }

    function drawTree(x, y, size, opacity) {
      ctx.globalAlpha = opacity;

      const b = size / 4;

      drawBlock(x + b * 1.5, y + b * 4, b, b * 3, "#5b3317");

      drawBlock(x + b, y + b, b * 2, b, "#145c1c");
      drawBlock(x + b * 0.5, y + b * 2, b * 3, b, "#1d7a28");
      drawBlock(x, y + b * 3, b * 4, b, "#249431");
      drawBlock(x + b * 0.5, y + b * 4, b * 3, b, "#1d7a28");

      ctx.globalAlpha = 1;
    }

    /* ============================================================
       13) Gras-Blöcke zeichnen
       ============================================================ */

    function drawGrassBlock(tileIndex, heightBlocks) {
      const x = worldToScreenX(tileIndex);
      const y = worldToScreenY(groundY - heightBlocks);

      const w = tileW;
      const h = tileH * heightBlocks;

      drawBlock(x, y, w, h, "#8b5a2b");
      drawBlock(x, y, w, tileH * 0.28, "#2bd63f");

      ctx.strokeStyle = "#2b1608";
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);

      drawBlock(x + tileW * 0.15, y + h * 0.55, tileW * 0.18, tileH * 0.18, "#5c3518");
      drawBlock(x + tileW * 0.6, y + h * 0.7, tileW * 0.18, tileH * 0.18, "#5c3518");

      if (showHitboxes) {
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);
      }
    }

    function drawGround() {
      const y = groundY * tileH;

      const start = Math.floor(cameraX) - 2;
      const end = Math.floor(cameraX + cols) + 2;

      for (let i = start; i <= end; i++) {
        if (getTile(i).gap) continue; // Loch: kein Boden zeichnen

        const sx = worldToScreenX(i);
        drawBlock(sx, y, tileW + 1, canvas.height - y, "#5a3317");
        drawBlock(sx, y, tileW + 1, tileH * 0.25, "#2bd63f");
      }
    }

    /* ============================================================
       14) Karotte und Jump-Pad zeichnen
       ============================================================ */

    function drawCarrot(tileIndex, tile) {
      const carrotY =
        tile.grassHeight > 0
          ? groundY - tile.grassHeight - 0.65
          : groundY - 0.65;

      const x = worldToScreenX(tileIndex + 0.5);
      const y = worldToScreenY(carrotY);

      const b = Math.min(tileW, tileH) / 8;

      drawBlock(x - b, y - b * 2, b * 2, b * 3, "#ff8c1a");
      drawBlock(x - b * 0.5, y + b, b, b, "#d96b00");

      drawBlock(x - b * 1.3, y - b * 3, b, b * 1.5, "#25c13b");
      drawBlock(x, y - b * 3.4, b, b * 1.7, "#25c13b");
      drawBlock(x + b * 0.8, y - b * 3, b, b * 1.5, "#25c13b");
    }

    function drawJumpPad(tileIndex) {
      const x = worldToScreenX(tileIndex);
      const y = worldToScreenY(groundY) - tileH * 0.18;

      drawBlock(x + tileW * 0.18, y, tileW * 0.64, tileH * 0.15, "#ffd400");

      ctx.strokeStyle = "white";
      ctx.lineWidth = 2;
      ctx.strokeRect(x + tileW * 0.18, y, tileW * 0.64, tileH * 0.15);
    }

    /* ============================================================
       15) Hasen zeichnen
       ============================================================ */

    function drawRabbit() {
      const skin = rabbitSkins[selectedRabbitSkin] || rabbitSkins[0];

      const b = Math.min(tileW, tileH) / 8;
      const centerX = worldToScreenX(player.x);
      const bottomY = worldToScreenY(player.y);
      const startX = centerX - b * 4;
      const startY = bottomY - b * 8;

      // Ohren
      drawBlock(startX + b, startY - b * 4, b * 2, b * 5, skin.body);
      drawBlock(startX + b * 5, startY - b * 4, b * 2, b * 5, skin.body);
      drawBlock(startX + b * 1.5, startY - b * 3, b, b * 3, skin.ear);
      drawBlock(startX + b * 5.5, startY - b * 3, b, b * 3, skin.ear);
      // Körper
      drawBlock(startX + b, startY + b, b * 6, b * 6, skin.body);
      // Auge + Nase
      drawBlock(startX + b * 5, startY + b * 3, b, b, skin.eye);
      drawBlock(startX + b * 6, startY + b * 5, b, b, skin.nose);
      // Füße
      drawBlock(startX + b, startY + b * 7, b * 2, b, skin.body);
      drawBlock(startX + b * 5, startY + b * 7, b * 2, b, skin.body);
      // Schwanz
      drawBlock(startX, startY + b * 5, b, b * 2, skin.body);

      ctx.strokeStyle = "#222";
      ctx.lineWidth = 2;
      ctx.strokeRect(startX + b, startY + b, b * 6, b * 6);

      if (showHitboxes) {
        const r = getPlayerRect();
        ctx.strokeStyle = "blue";
        ctx.lineWidth = 3;
        ctx.strokeRect(worldToScreenX(r.left), worldToScreenY(r.top), player.w * tileW, player.h * tileH);
      }
    }

    function drawFox() {
      const skin = foxSkins[selectedFoxSkin] || foxSkins[0];

      const b = Math.min(tileW, tileH) / 8;
      const anchorX = worldToScreenX(fox.x + fox.w / 2);
      const groundScreenY = worldToScreenY(groundY);
      const startX = anchorX - b * 5.5;
      const startY = groundScreenY - b * 12.5;

      // Körper
      drawBlock(startX + b, startY + b * 4, b * 9, b * 6, skin.body);
      // Kopf
      drawBlock(startX + b * 8, startY + b * 1.5, b * 4.5, b * 4.5, skin.body);
      // Ohren
      drawBlock(startX + b * 8.2, startY, b * 1.6, b * 2.2, skin.body);
      drawBlock(startX + b * 11, startY, b * 1.6, b * 2.2, skin.body);
      // Schnauze (weiß)
      drawBlock(startX + b * 10, startY + b * 4, b * 2.5, b * 1.5, skin.white);
      // Auge + Nase
      drawBlock(startX + b * 10, startY + b * 2.8, b, b, skin.eye);
      drawBlock(startX + b * 12.2, startY + b * 4.4, b, b, "black");
      // Beine
      drawBlock(startX + b * 2, startY + b * 10, b * 1.7, b * 2.5, skin.leg);
      drawBlock(startX + b * 7, startY + b * 10, b * 1.7, b * 2.5, skin.leg);
      // Schwanz (hinten) mit weißer Spitze
      drawBlock(startX - b * 2.5, startY + b * 4.2, b * 3.5, b * 3.5, skin.body);
      drawBlock(startX - b * 3.5, startY + b * 4.2, b, b * 3.5, skin.white);

      ctx.strokeStyle = "#4a1b05";
      ctx.lineWidth = 2;
      ctx.strokeRect(startX + b, startY + b * 4, b * 9, b * 6);

      if (showHitboxes) {
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.strokeRect(worldToScreenX(fox.x), worldToScreenY(groundY - fox.h), fox.w * tileW, fox.h * tileH);
      }
    }

    function createSkinMenus() {
      rabbitSkinOptions.innerHTML = "";
      foxSkinOptions.innerHTML = "";

      rabbitSkins.forEach((skin, index) => {
        const button = document.createElement("button");
        button.className = "skinOption";
        button.title = skin.name;
        button.innerHTML =
          '<div class="skinPreview">' +
          '<div class="previewBlock previewRabbitEar1" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewRabbitEar2" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewRabbitBody" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewRabbitEye" style="background:' + skin.eye + '"></div>' +
          '</div>';
        button.addEventListener("click", () => {
          selectedRabbitSkin = index;
          localStorage.setItem("hasenRabbitSkin", String(index));
          updateSkinSelection();
          updateMenuRabbitSkin();
        });
        rabbitSkinOptions.appendChild(button);
      });

      foxSkins.forEach((skin, index) => {
        const button = document.createElement("button");
        button.className = "skinOption";
        button.title = skin.name;
        button.innerHTML =
          '<div class="skinPreview">' +
          '<div class="previewBlock previewFoxTail" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewFoxBody" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewFoxHead" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewFoxEar1" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewFoxEar2" style="background:' + skin.body + '"></div>' +
          '<div class="previewBlock previewFoxEye" style="background:' + skin.eye + '"></div>' +
          '</div>';
        button.addEventListener("click", () => {
          selectedFoxSkin = index;
          localStorage.setItem("hasenFoxSkin", String(index));
          updateSkinSelection();
        });
        foxSkinOptions.appendChild(button);
      });

      updateSkinSelection();
      updateMenuRabbitSkin();
    }

    function updateSkinSelection() {
      rabbitSkinOptions.querySelectorAll(".skinOption").forEach((b, i) =>
        b.classList.toggle("selected", i === selectedRabbitSkin));
      foxSkinOptions.querySelectorAll(".skinOption").forEach((b, i) =>
        b.classList.toggle("selected", i === selectedFoxSkin));
    }

    function updateMenuRabbitSkin() {
      const skin = rabbitSkins[selectedRabbitSkin] || rabbitSkins[0];
      document.querySelectorAll(".menuRabbit .rabbitPart").forEach(p => { p.style.background = skin.body; });
      document.querySelector(".rabbitInner1").style.background = skin.ear;
      document.querySelector(".rabbitInner2").style.background = skin.ear;
      document.querySelector(".rabbitNose").style.background = skin.nose;
      document.querySelector(".rabbitEye").style.background = skin.eye;
    }

    function drawFarmer() {
      if (!farmer.active) return;

      const x = worldToScreenX(farmer.x);
      const y = worldToScreenY(groundY - farmer.h);
      const w = farmer.w * tileW;
      const h = farmer.h * tileH;

      // Beine (Jeans)
      drawBlock(x + w * 0.18, y + h * 0.58, w * 0.26, h * 0.42, "#274a8a");
      drawBlock(x + w * 0.56, y + h * 0.58, w * 0.26, h * 0.42, "#274a8a");
      // Oberkörper (Hemd)
      drawBlock(x + w * 0.1, y + h * 0.28, w * 0.8, h * 0.34, "#8a2f2f");
      // Arm reicht nach links (will den Hasen greifen)
      drawBlock(x - w * 0.2, y + h * 0.32, w * 0.32, h * 0.12, "#e0b48a");
      // Kopf
      drawBlock(x + w * 0.3, y + h * 0.05, w * 0.4, h * 0.22, "#e0b48a");
      // Strohhut
      drawBlock(x + w * 0.15, y + h * 0.04, w * 0.7, h * 0.05, "#caa64a");
      drawBlock(x + w * 0.32, y - h * 0.06, w * 0.36, h * 0.12, "#caa64a");

      if (showHitboxes) {
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.strokeRect(x + w * 0.25, y, w * 0.5, h);
      }
    }

    /* ============================================================
       16) Gesamtes Spiel zeichnen
       ============================================================ */

    function renderGame() {
      drawBackground();
      drawGround();

      const start = Math.floor(cameraX) - 2;
      const end = Math.floor(cameraX + cols) + 2;

      for (let i = start; i <= end; i++) {
        const tile = getTile(i);

        if (tile.grassHeight > 0) {
          drawGrassBlock(i, tile.grassHeight);
        }

        if (tile.carrot) {
          drawCarrot(i, tile);
        }

        if (tile.jumpPad) {
          drawJumpPad(i);
        }
      }

      drawFarmer();
      drawFox();
      drawRabbit();
    }

    /* ============================================================
       17) Spielzustand: Start, Neustart, Game Over
       ============================================================ */

    function restartGame() {
      player.x = 8;
      player.y = groundY;
      player.vx = 0;
      player.vy = 0;
      player.onGround = true;
      player.canDoubleJump = true;
      player.doubleJumpUsed = false;

      cameraX = 0;
      carrots = 0;
      points = 0;
      scoreStartTime = performance.now();

      fox.x = player.x - 11;
      farmer.active = false;
      farmer.timer = 0;
      farmer.nextIn = 9 + Math.random() * 8;

      createStartWorld();
      generateMoreWorld();

      gameState = "playing";

      menuScreen.style.display = "none";
      gameOverText.style.display = "none";
      info.style.display = "block";
      stats.style.display = "block";
      touchControls.style.display = "flex";

      updateStats();
    }

    async function fetchLeaderboard() {
      try {
        const res = await fetch(BIN_URL + "/latest", {
          headers: { "X-Access-Key": ACCESS_KEY }
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const rec = data.record;
        if (Array.isArray(rec)) leaderboardData = rec;
        else if (rec && Array.isArray(rec.leaderboard)) leaderboardData = rec.leaderboard;
        else leaderboardData = [];
      } catch (e) {
        console.warn("Rangliste konnte nicht geladen werden:", e);
      }
      leaderboardData.sort((a, b) => b.score - a.score);
      return leaderboardData;
    }

    async function putLeaderboard() {
      try {
        const res = await fetch(BIN_URL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-Access-Key": ACCESS_KEY,
            "X-Bin-Versioning": "false"
          },
          body: JSON.stringify(leaderboardData)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
      } catch (e) {
        console.warn("Rangliste konnte nicht gespeichert werden:", e);
      }
    }

    async function saveScore(finalScore) {
      await fetchLeaderboard();
      const entry = {
        id: Date.now() + "_" + Math.random(),
        name: playerName,
        score: finalScore,
        carrots: carrots
      };
      leaderboardData.push(entry);
      leaderboardData.sort((a, b) => b.score - a.score);
      const rank = leaderboardData.findIndex(e => e.id === entry.id) + 1;
      leaderboardData = leaderboardData.slice(0, 10);
      await putLeaderboard();
      return rank;
    }

    function renderBoard(rank) {
      document.getElementById("rankLine").textContent = rank ? ("Dein Platz: " + rank) : "";
      let txt = "Rangliste:\n";
      if (!leaderboardData.length) {
        txt += "Noch keine Einträge";
      } else {
        leaderboardData.slice(0, 5).forEach((e, i) => {
          txt += (i + 1) + ". " + e.name + " – " + e.score + "\n";
        });
      }
      document.getElementById("boardList").textContent = txt;
    }

    function showGameOver() {
      if (gameState === "gameover") return;
      gameState = "gameover";
      keys.left = false;
      keys.right = false;

      touchControls.style.display = "none";

      const finalScore = points + carrots * 5;
      document.getElementById("finalScoreLine").textContent =
        `⭐ ${points} + 🥕 ${carrots}×5 = ${finalScore} Punkte`;
      document.getElementById("rankLine").textContent = "Speichere …";
      document.getElementById("boardList").textContent = "";
      gameOverText.style.display = "flex";

      saveScore(finalScore).then(rank => renderBoard(rank));
    }

    function updateStats() {
      stats.textContent = `🥕 Karotten: ${carrots} | ⭐ Punkte: ${points}`;
    }

    /* ============================================================
       18) Game Loop
       ============================================================ */

    function isPortraitPhone() {
      return window.innerHeight > window.innerWidth &&
             Math.min(window.innerWidth, window.innerHeight) < 950;
    }

    function drawRotateMessage() {
      ctx.fillStyle = "#062406";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold " + Math.round(canvas.width * 0.12) + "px Arial";
      ctx.fillText("📱↻", canvas.width / 2, canvas.height / 2 - canvas.width * 0.08);
      ctx.font = "bold " + Math.round(canvas.width * 0.05) + "px Arial";
      ctx.fillText("Bitte quer drehen", canvas.width / 2, canvas.height / 2 + canvas.width * 0.04);
      ctx.textAlign = "left";
    }

    function gameLoop(time) {
      const deltaTime = Math.min(32, time - lastTime);
      lastTime = time;

      // Quermodus-Zwang direkt auf dem Canvas (unabhängig von HTML/CSS).
      if (isPortraitPhone()) {
        keys.left = false;
        keys.right = false;
        drawRotateMessage();
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === "playing") {
        updateGame(deltaTime);
        renderGame();
      }

      requestAnimationFrame(gameLoop);
    }

    /* ============================================================
       19) Tastatursteuerung
       ============================================================ */

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === "d" || event.key === "ArrowRight") {
        keys.right = true;
      }

      if (key === "a" || event.key === "ArrowLeft") {
        keys.left = true;
      }

      if (event.key === " ") {
        event.preventDefault();
        startJump();
      }

      if (event.key === "Enter") {
        restartGame();
      }

      if (key === "h") {
        showHitboxes = !showHitboxes;
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (key === "d" || event.key === "ArrowRight") {
        keys.right = false;
      }

      if (key === "a" || event.key === "ArrowLeft") {
        keys.left = false;
      }
    });

    /* ============================================================
       20) Buttons
       ============================================================ */

    playButton.addEventListener("click", () => {
      restartGame();
    });

    restartButton.addEventListener("click", () => {
      restartGame();
    });

    homeButton.addEventListener("click", () => {
      gameState = "menu";
      menuScreen.style.display = "flex";
      gameOverText.style.display = "none";
      info.style.display = "none";
      stats.style.display = "none";
      touchControls.style.display = "none";
    });

    nameButton.textContent = "Name: " + playerName;
    nameButton.addEventListener("click", () => {
      const n = prompt("Dein Name für die Rangliste:", playerName);
      if (n && n.trim()) {
        playerName = n.trim().slice(0, 14);
        localStorage.setItem("hasenName", playerName);
        nameButton.textContent = "Name: " + playerName;
      }
    });

    // Touch-Steuerung
    function holdButton(el, key) {
      el.addEventListener("pointerdown", (e) => { e.preventDefault(); keys[key] = true; });
      ["pointerup", "pointerleave", "pointercancel"].forEach(ev =>
        el.addEventListener(ev, () => { keys[key] = false; })
      );
    }
    holdButton(leftBtn, "left");
    holdButton(rightBtn, "right");
    jumpBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); startJump(); });

    // Tippen aufs Spielfeld = Sprung
    canvas.addEventListener("pointerdown", () => {
      if (gameState === "playing") startJump();
    });

    /* ============================================================
       21) Initialisierung
       ============================================================ */

    // Quermodus erzwingen – zusätzlich zur CSS-Media-Query auch per JS,
    // damit es in jedem (auch In-App-)Browser zuverlässig greift.
    const rotateNotice = document.getElementById("rotateNotice");
    function checkOrientation() {
      const portrait = window.innerHeight > window.innerWidth;
      const small = Math.min(window.innerWidth, window.innerHeight) < 950;
      rotateNotice.classList.toggle("show", portrait && small);
    }
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    checkOrientation();

    resizeCanvas();
